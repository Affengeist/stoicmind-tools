<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stoischer Impuls der Woche</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;600&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --petrol-deep: #1E3A3A;
    --brass: #B8944A;
    --brass-light: #D4B06A;
    --warm-light: #F7F1E8;
    --text-mid: #5A5A54;
    --text-light: #8A8A82;
    --border: #D4CCBE;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--warm-light);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 740px;
    padding: 60px clamp(24px, 5vw, 48px) 80px;
    margin: 0 auto;
  }

  .week-label {
    font-family: 'Poppins', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--brass);
    margin-bottom: 24px;
  }

  .impulse-title {
    font-family: 'Lora', serif;
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 500;
    color: var(--petrol-deep);
    line-height: 1.3;
    margin-bottom: 32px;
  }

  .brass-line {
    width: 60px;
    height: 2px;
    background: var(--brass);
    margin-bottom: 32px;
  }

  .impulse-text {
    font-family: 'Poppins', sans-serif;
    font-size: 17px;
    font-weight: 300;
    color: var(--text-mid);
    line-height: 1.9;
    margin-bottom: 24px;
  }

  .impulse-closing {
    font-family: 'Lora', serif;
    font-size: 17px;
    font-style: italic;
    color: var(--petrol-deep);
    line-height: 1.6;
    margin-top: 40px;
    border-left: 3px solid var(--brass);
    padding-left: 20px;
  }

  .footer-note {
    margin-top: 56px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 300;
    color: var(--text-light);
    line-height: 1.7;
  }

  .footer-note a {
    color: var(--brass);
    text-decoration: none;
    font-weight: 400;
    transition: color 0.3s;
  }

  .footer-note a:hover {
    color: var(--brass-light);
  }

  .week-nav {
    margin-top: 16px;
    font-family: 'Poppins', sans-serif;
    font-size: 12px;
    color: var(--text-light);
  }

  .week-dots {
    display: flex;
    gap: 4px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .week-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
  }

  .week-dot.past {
    background: var(--petrol-deep);
    opacity: 0.3;
  }

  .week-dot.current {
    background: var(--brass);
    box-shadow: 0 0 4px rgba(184, 148, 74, 0.5);
  }

  @media (max-width: 600px) {
    .container { padding: 40px 20px 60px; }
    .impulse-text { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="week-label" id="week-label"></div>
  <h1 class="impulse-title" id="impulse-title"></h1>
  <div class="brass-line"></div>
  <div id="impulse-body"></div>

  <div class="footer-note">
    Jede Woche ein neuer Impuls. Kein Algorithmus, keine Benachrichtigung — einfach vorbeikommen.<br>
    <a href="https://www.stoicmind.at" target="_top">← Zurück zur Startseite</a>
  </div>

  <div class="week-nav">
    <span id="week-progress"></span>
    <div class="week-dots" id="week-dots"></div>
  </div>
</div>

<script>
  /*
  ============================================================
  IMPULSE — Hier deine 52 Texte eintragen.

  Format pro Impuls:
  {
    title: "Überschrift des Impulses",
    body: "Der Haupttext. Drei bis vier Sätze. Ein Gedanke.",
    closing: "Ein Schlusssatz oder -frage in Kursiv."
  }

  Die Impulse rotieren automatisch basierend auf der
  Kalenderwoche. KW 1 = Impuls 0, KW 2 = Impuls 1 usw.
  Nach 52 Wochen beginnt der Zyklus von vorn.

  Ersetze die Beispiele durch deine eigenen Texte.
  ============================================================
  */

  var impulse = [
    {
      title: "Du bist nicht zuständig für das Wetter.",
      body: "Es gibt Dinge, die du beeinflussen kannst, und Dinge, die du nicht beeinflussen kannst. Die Kunst besteht nicht darin, beide Listen auswendig zu kennen — sondern darin, im konkreten Moment zu unterscheiden, mit welcher du es gerade zu tun hast. Die meiste Energie geht nicht an echte Probleme verloren, sondern an den Versuch, Dinge zu kontrollieren, die nie in deiner Hand lagen.",
      closing: "Was auf deiner Liste steht heute unter der falschen Spalte?"
    },
    {
      title: "Die Lücke zwischen Reiz und Reaktion.",
      body: "Jemand sagt etwas, und du reagierst. Zwischen dem Satz und deiner Antwort liegt ein Raum — manchmal so schmal, dass du ihn nicht bemerkst. Aber er ist da. Die Stoiker trainierten genau diesen Raum: nicht um Gefühle zu unterdrücken, sondern um zu entscheiden, ob die Reaktion, die gerade hochkommt, wirklich die ist, die du geben willst.",
      closing: "Wie oft reagierst du heute, bevor du entschieden hast?"
    },
    {
      title: "Dankbarkeit ohne Kitsch.",
      body: "Vergiss die Listen. Vergiss das Tagebuch. Die Stoiker hatten eine wirksamere Übung: Stell dir vor, du hättest verloren, was du hast. Nicht als Angstübung, sondern als Wahrnehmungsübung. Wer einmal wirklich gespürt hat, wie es wäre, die eigene Gesundheit, die Wohnung, einen Menschen zu verlieren, braucht keine Dankbarkeitsliste mehr. Die Dankbarkeit kommt von selbst — und sie ist ehrlich.",
      closing: "Was würdest du am meisten vermissen, wenn es morgen nicht mehr da wäre?"
    },
    {
      title: "Du musst nicht alles sofort klären.",
      body: "Manche Spannungen lösen sich auf, wenn man sie in Ruhe lässt. Nicht alle — aber erstaunlich viele. Der Impuls, sofort zu reagieren, sofort zu klären, sofort eine Antwort zu haben, ist selten ein Zeichen von Reife. Meistens ist es Unbehagen, das nach Entladung sucht. Ein Stoiker hätte gesagt: Warte einen Tag. Wenn es morgen noch wichtig ist, handle dann.",
      closing: "Welches Gespräch könntest du heute nicht führen — und damit genau richtig liegen?"
    },
    {
      title: "Das Nein, das sich falsch anfühlt.",
      body: "Du hast Nein gesagt. Freundlich, klar, angemessen. Und jetzt ist da dieses Ziehen. Das Gefühl, etwas Falsches getan zu haben. Dieser Impuls ist kein moralisches Signal — er ist ein Reflex. Ein System, das gelernt hat, soziale Spannung wie eine Bedrohung zu behandeln. Das Nein war richtig. Was jetzt kommt, ist der Preis der Klarheit. Und der wird mit der Zeit leiser.",
      closing: "Welches Nein trägst du gerade mit schlechtem Gewissen — obwohl es stimmig war?"
    },
    {
      title: "Hindernisse sind das Material.",
      body: "Marc Aurel schrieb, dass das Hindernis auf dem Weg zum Weg wird. Das klingt wie ein Poster. Aber gemeint ist etwas Konkretes: Die Schwierigkeit, vor der du stehst, ist nicht das, was zwischen dir und deinem Leben steht. Sie ist dein Leben. Wer darauf wartet, dass die Hindernisse verschwinden, wartet darauf, dass das Leben aufhört.",
      closing: "Was wäre, wenn das, was dich gerade aufhält, genau die Aufgabe ist?"
    },
    {
      title: "Die vier Fragen am Abend.",
      body: "Die Stoiker empfahlen eine Abendübung: Was habe ich heute gut gemacht? Wo bin ich meinen Grundsätzen untreu geworden? Was hätte ich besser machen können? Und was habe ich gelernt? Nicht als Selbstgericht, sondern als nüchterne Bestandsaufnahme. Wer sich jeden Abend fünf Minuten ehrlich Rechenschaft gibt, braucht keinen Coach. Und wer es trotzdem tut, kommt schneller voran.",
      closing: "Wie würde sich dein Abend verändern, wenn du diese vier Fragen ehrlich beantwortest?"
    },
    {
      title: "Weniger Meinung, mehr Beobachtung.",
      body: "Bevor du etwas bewertest, nimm es wahr. Das klingt trivial, ist es aber nicht. Die meisten Urteile stehen fest, bevor die Beobachtung abgeschlossen ist. Ein Stoiker übt sich darin, den Moment zwischen Wahrnehmung und Bewertung zu dehnen. Nicht um urteilsfrei zu werden — das wäre unmenschlich — sondern um sicherzustellen, dass das Urteil auf Beobachtung beruht und nicht auf Gewohnheit.",
      closing: "Wo hast du heute geurteilt, bevor du hingeschaut hast?"
    },
    {

      closing: "Welche Entscheidung hast du zuletzt aus einer Stimmung heraus getroffen — statt aus Überlegung?"
    },
    {

      closing: "Wann hast du dich zuletzt freiwillig einer Unannehmlichkeit ausgesetzt?"
    },
    {

    },
    {

      closing: "Was besitzt du heute, wovon du vor zehn Jahren nicht zu träumen gewagt hättest?"
    },
    {
      title: "Die Kunst, sich nicht einzumischen.",

      closing: "Wo verwechselst du gerade Fürsorge mit dem Bedürfnis, recht zu behalten?"
    },
    {

      body: "Geduldig zu sein heißt nicht, nichts zu tun und abzuwarten. Es heißt, den Unterschied zu erkennen zwischen Dingen, die Zeit brauchen, und Dingen, die Handlung brauchen. Wer bei beidem gleich reagiert — entweder immer drängend oder immer abwartend — verwechselt Temperament mit Weisheit. Die eigentliche Übung liegt darin, in jedem einzelnen Fall neu zu entscheiden.",
      closing: "Wo verwechselst du Geduld mit Aufschieben?"
    },
    {
      title: "Das Gespräch, das du vermeidest.",
      body: "Es gibt ein Gespräch, das du seit Wochen vor dir herschiebst. Du kennst es. Du weißt, mit wem. Und du weißt, warum du es vermeidest: nicht weil du den Ausgang fürchtest, sondern weil du die Spannung fürchtest, die dorthin führt. Diese Spannung ist der Preis der Klarheit. Und sie ist fast immer kürzer und erträglicher, als die Wochen der Vermeidung, die ihr vorausgehen.",
      closing: "Welches Gespräch schiebst du gerade vor dir her — und was kostet dich das Aufschieben?"
    },
    {
      title: "Du musst nicht verstanden werden.",
      body: "Der Wunsch, verstanden zu werden, ist zutiefst menschlich. Aber er kann zur Falle werden, wenn du anfängst, dich zu erklären, wo keine Erklärung verlangt wurde. Manche Entscheidungen brauchst du niemandem zu begründen. Manche Gefühle musst du niemandem beweisen. Es reicht, wenn du selbst weißt, warum du tust, was du tust. Das ist keine Arroganz. Das ist Selbstführung.",
      closing: "Wo erklärst du dich gerade jemandem, der gar nicht gefragt hat?"
    },
    {
      title: "Älter werden ist kein Verlust.",
      body: "Die Kultur erzählt dir, dass du mit jedem Jahr etwas verlierst. Frische. Möglichkeiten. Relevanz. Was sie verschweigt: Mit jedem Jahr gewinnst du etwas, das sich nicht kaufen lässt — die Fähigkeit, Wesentliches von Unwesentlichem zu unterscheiden. Wer mit fünfzig nicht klarer sieht als mit dreißig, hat nicht hingeschaut. Wer klarer sieht, hat allen Grund, das als Gewinn zu betrachten.",
      closing: "Was kannst du heute, das du mit dreißig nicht konntest — und wann hast du dich zuletzt dafür gewürdigt?"

    {

      body: "Du triffst eine Entscheidung, die deinen Werten entspricht. Und trotzdem fühlt sie sich unangenehm an. Das ist normal. Unbehagen ist kein Beweis dafür, dass du falsch liegst. Es ist oft ein Beweis dafür, dass du etwas Neues tust. Dein Nervensystem kann nicht zwischen „gefährlich" und „ungewohnt" unterscheiden. Dein Verstand schon.",
      closing: "Welche richtige Entscheidung hast du zuletzt angezweifelt, nur weil sie sich unbequem angefühlt hat?"
    },
    {
      title: "Die Stille nach dem Funktionieren.",
      body: "Du hast funktioniert. Jahrelang. Zuverlässig. Für andere. Und irgendwann, in einem ruhigen Moment, merkst du, dass du nicht weißt, was du eigentlich willst — jenseits dessen, was von dir erwartet wird. Diese Stille ist kein Defizit. Sie ist der Anfang einer ehrlichen Frage. Und ehrliche Fragen brauchen keinen sofortigen Antwort. Sie brauchen Raum.",

    },
    {

      closing: "Wo hast du zuletzt eine Grenze verwässert, weil du Ablehnung befürchtet hast?"
    },
    {
      title: "Nicht jede Traurigkeit braucht eine Lösung.",
      body: "Manchmal bist du traurig, und es gibt keinen Grund dafür. Keinen Anlass, kein Ereignis, nichts, das sich reparieren ließe. Die Gewohnheit, jedes Gefühl sofort in ein Problem zu verwandeln, das gelöst werden muss, ist selbst das Problem. Manche Stimmungen wollen nichts von dir. Sie wollen nur da sein dürfen, eine Weile, und dann gehen sie von selbst.",
      closing: "Wann hast du dir zuletzt erlaubt, traurig zu sein, ohne sofort nach dem Warum zu suchen?"
    },
    {

    },
    {

  function getWeekNumber() {
    var now = new Date();
    var start = new Date(now.getFullYear(), 0, 1);
    var diff = now - start;
    var oneWeek = 604800000;
    return Math.ceil((diff / oneWeek) + start.getDay() / 7);
  }

  function render() {
    var week = getWeekNumber();
    var index = (week - 1) % impulse.length;
    var current = impulse[index];

    document.getElementById('week-label').textContent = 'Impuls · Kalenderwoche ' + week;
    document.getElementById('impulse-title').textContent = current.title;

    var bodyHtml = '';
    var paragraphs = current.body.split('\n\n');
    for (var i = 0; i < paragraphs.length; i++) {
      bodyHtml += '<p class="impulse-text">' + paragraphs[i] + '</p>';
    }
    bodyHtml += '<p class="impulse-closing">' + current.closing + '</p>';
    document.getElementById('impulse-body').innerHTML = bodyHtml;

    document.getElementById('week-progress').textContent = 'Woche ' + week + ' von 52';

    var dotsHtml = '';
    for (var d = 0; d < 52; d++) {
      var cls = 'week-dot';
      if (d < week - 1) cls += ' past';
      if (d === week - 1) cls += ' current';
      dotsHtml += '<div class="' + cls + '"></div>';
    }
    document.getElementById('week-dots').innerHTML = dotsHtml;
  }

  render();
</script>
